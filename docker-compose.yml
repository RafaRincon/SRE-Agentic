version: "3.12"

services:
  sre-agent:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${APP_PORT:-8000}:8000"
    env_file:
      - .env
    volumes:
      - ./app:/app/app
      - eshop-cache:/app/.eshop_cache
    restart: unless-stopped

volumes:
  eshop-cache:
    driver: local
