services:
  sre-agent:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${APP_PORT:-8000}:8000"
    env_file:
      - .env
    environment:
      APP_ENV: development
      APP_ENABLE_DOCS: "true"
      APP_WORKERS: "1"
    volumes:
      - ./app:/app/app
      - eshop-cache:/app/.eshop_cache
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/livez', timeout=5)"
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  eshop-cache:
    driver: local
