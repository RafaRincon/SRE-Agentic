services:
  sre-agent-bootstrap:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    command: ["python", "-m", "app.bootstrap"]
    restart: "no"
    volumes:
      - eshop-cache:/app/.eshop_cache
    tmpfs:
      - /tmp:size=64m,mode=1777
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    mem_limit: 2g
    cpus: 1.50

  sre-agent:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      sre-agent-bootstrap:
        condition: service_completed_successfully
    ports:
      - "${APP_PORT:-8000}:8000"
    env_file:
      - .env
    environment:
      APP_ENV: production
      APP_REQUIRE_INDEX_READY: "true"
      APP_ENABLE_DOCS: "${APP_ENABLE_DOCS:-false}"
    restart: unless-stopped
    read_only: true
    volumes:
      - eshop-cache:/app/.eshop_cache
    tmpfs:
      - /tmp:size=64m,mode=1777
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/readyz', timeout=5)"
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    mem_limit: 2g
    cpus: 1.50

volumes:
  eshop-cache:
    driver: local
